<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · BTC AI Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    .login-root {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .login-brand svg {
      width: 36px;
      height: 36px;
      color: var(--accent);
    }
    .login-brand h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }
    .login-brand p {
      font-size: 12px;
      color: var(--text-3);
      margin: 0;
      text-align: center;
    }
    .login-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-md);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover { background: var(--surface); border-color: var(--accent); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    .login-error {
      font-size: 12px;
      color: var(--red);
      text-align: center;
      display: none;
    }
    .login-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-md);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-root">
  <div class="login-card">

    <div class="login-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11.767 19.089c4.924.868 6.14-6.025 1.216-6.894m-1.216 6.894L5.86 18.047m5.908 1.042-.347 1.97m1.563-8.864c4.924.869 6.14-6.025 1.215-6.893m-1.215 6.893-3.94-.694m5.155-6.2L8.29 4.26m5.908 1.042.348-1.97M7.48 20.364l3.126-17.727"/>
      </svg>
      <h1>BTC AI Agent</h1>
      <p>Sign in to access your trading dashboard</p>
    </div>

    <div class="login-divider"></div>

    <button class="btn-google" id="google-btn">
      <!-- Google logo -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
      <span class="login-spinner" id="login-spinner"></span>
    </button>

    <p class="login-error" id="login-error"></p>

  </div>
</div>

<!-- Firebase JS SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:            "AIzaSyDDue1K_FPVYFzh3Uqe04mTrXxqehOqQq8",
    authDomain:        "btc-ai-agent.firebaseapp.com",
    projectId:         "btc-ai-agent",
    storageBucket:     "btc-ai-agent.firebasestorage.app",
    messagingSenderId: "654602808108",
    appId:             "1:654602808108:web:f9a5272e443560608b9a89",
  });

  const auth     = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  // Already signed in → go straight to dashboard
  auth.onAuthStateChanged(user => {
    if (user) window.location.replace('/');
  });

  const btn     = document.getElementById('google-btn');
  const spinner = document.getElementById('login-spinner');
  const errEl   = document.getElementById('login-error');

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    errEl.style.display = 'none';
    try {
      await auth.signInWithPopup(provider);
      // onAuthStateChanged above handles the redirect
    } catch (e) {
      errEl.textContent = e.message || 'Sign-in failed. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>
